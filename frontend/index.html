<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Resizer — AWS Pipeline</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --bg:      #0f0f0f;
      --surface: #181818;
      --border:  #2c2c2c;
      --accent:  #f5e642;
      --text:    #e4e4e4;
      --muted:   #5a5a5a;
      --success: #4ade80;
      --error:   #f87171;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .wrapper { width: 100%; max-width: 440px; }

    .tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 3px 9px;
      display: inline-block;
      margin-bottom: 1.1rem;
    }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.55rem;
      line-height: 1.25;
      font-weight: 700;
    }
    h1 em { color: var(--accent); font-style: normal; }

    .sub {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
    }

    .card {
      margin-top: 2.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
    }

    .pick-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.4rem;
    }

    .pick-btn {
      flex-shrink: 0;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      background: transparent;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .pick-btn:hover { background: rgba(245,230,66,0.08); }

    input[type="file"] { display: none; }

    .file-name {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .upload-btn {
      width: 100%;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      padding: 0.85rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .upload-btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
    .upload-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .status {
      margin-top: 1.2rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      min-height: 1.1rem;
      letter-spacing: 0.04em;
    }
    .status.idle    { color: var(--muted); }
    .status.loading { color: var(--accent); }
    .status.success { color: var(--success); }
    .status.error   { color: var(--error); }

    .note {
      margin-top: 1.8rem;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="tag">AWS Serverless</div>
    <h1>Image<br><em>Resizer</em></h1>
    <p class="sub">Upload a JPG or PNG — resized automatically via Lambda.</p>

    <div class="card">
      <div class="pick-row">
        <label class="pick-btn" for="fileInput">Choose File</label>
        <input type="file" id="fileInput" accept="image/jpeg,image/png" />
        <span class="file-name" id="fileName">No file chosen</span>
      </div>

      <button class="upload-btn" id="uploadBtn" disabled>Upload &amp; Resize</button>

      <div class="status idle" id="status">Waiting for file...</div>
    </div>

    <p class="note">
      Supported: JPG, PNG &nbsp;·&nbsp; Max 10 MB<br>
      You will receive an email once processing is complete.
    </p>
  </div>

  <script>
    // Replace with your API Gateway invoke URL
    const SIGNER_API_URL = "https://YOUR_API_ID.execute-api.ap-south-1.amazonaws.com/prod/get-upload-url";

    const fileInput = document.getElementById("fileInput");
    const fileName  = document.getElementById("fileName");
    const uploadBtn = document.getElementById("uploadBtn");
    const statusEl  = document.getElementById("status");

    function setStatus(msg, type = "idle") {
      statusEl.textContent = msg;
      statusEl.className   = `status ${type}`;
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (file) {
        fileName.textContent = file.name;
        uploadBtn.disabled   = false;
        setStatus("Ready to upload.", "idle");
      }
    });

    uploadBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];
      if (!file) return;

      uploadBtn.disabled = true;
      setStatus("Getting upload URL...", "loading");

      try {
        // Step 1: Get pre-signed URL from Signer Lambda via API Gateway
        const signerRes = await fetch(SIGNER_API_URL, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ fileName: file.name, fileType: file.type }),
        });

        if (!signerRes.ok) throw new Error("Failed to get upload URL.");
        const { uploadUrl } = await signerRes.json();

        setStatus("Uploading to S3...", "loading");

        // Step 2: Upload directly to S3 using the pre-signed URL
        const uploadRes = await fetch(uploadUrl, {
          method:  "PUT",
          headers: { "Content-Type": file.type },
          body:    file,
        });

        if (!uploadRes.ok) throw new Error("Upload to S3 failed.");

        setStatus("Upload successful! Processing started — check your email.", "success");
      } catch (err) {
        console.error(err);
        setStatus(`Error: ${err.message}`, "error");
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
